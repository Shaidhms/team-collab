name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test -- --run

  e2e:
    name: Playwright E2E + axe a11y
    runs-on: ubuntu-latest
    needs: quality
    env:
      # E2E hits the runtime which calls sign(); SESSION_SECRET must be set or it throws.
      SESSION_SECRET: ci-test-secret-not-for-production
      # Force the in-memory backend so CI doesn't need Firestore credentials.
      STORE_BACKEND: memory
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build

      - run: npm run test:e2e

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
