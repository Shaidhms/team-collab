# Cloud Build pipeline. Triggered by Cloud Build GitHub trigger on push to main.
# Gates the deploy on lint + typecheck + unit tests passing.

steps:
  - id: install-and-test
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        npm ci --no-audit --no-fund
        npm run lint
        npm run typecheck
        npm test -- --run

  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/team-collab/team-collab:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/team-collab/team-collab:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/team-collab/team-collab

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - team-collab
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/team-collab/team-collab:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=1
      - --max-instances=3
      - --concurrency=80
      - --set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/team-collab/team-collab:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/team-collab/team-collab:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
